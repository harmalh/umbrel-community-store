manifestVersion: 1.1
id: harmalh-paperclip
name: Paperclip
tagline: Autonomous AI workspace for coding and operations
icon: https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-paperclip/assets/icon.svg
category: ai
version: "2026.325.5"
port: 3100
description: >-
  Umbrel package for Paperclip using the embedded PostgreSQL runtime inside the
  Paperclip container.


  First-time admin: Paperclip cannot show the CEO invite URL in the browser (only a
  hash is stored). After install or restart, open PAPERCLIP_FIRST_ADMIN_INVITE.txt
  in this app's Umbrel data directory for the link, or see bootstrap-ceo-automation.log.


  This package intentionally uses a single-container topology:
  no external database service and no DATABASE_URL.


  All runtime state is persisted under APP_DATA_DIR via PAPERCLIP_HOME.


  Packaging source: https://github.com/harmalh/umbrel-paperclip
developer: Paperclip AI
website: https://github.com/paperclipai/paperclip
submitter: Harm Alhusen
submission: https://github.com/harmalh/umbrel-community-store
repo: https://github.com/paperclipai/paperclip
support: https://github.com/paperclipai/paperclip/issues
gallery:
  - https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-paperclip/assets/gallery/1.svg
  - https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-paperclip/assets/gallery/2.svg
releaseNotes: >-
  Persist first-admin invite URL (Paperclip UI cannot display it).


  - PAPERCLIP_FIRST_ADMIN_INVITE.txt under app data; --base-url for correct hostname.
  - Skip bootstrap-ceo once file has an invite URL (no rotate every restart).
  - Append bootstrap logs instead of truncating.


  Earlier: Postgres data-dir perms; health-gated bootstrap; post-start.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
