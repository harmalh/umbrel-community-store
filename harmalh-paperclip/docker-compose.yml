version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: harmalh-paperclip_bootstrap_1
      APP_PORT: 80

  bootstrap:
    image: nginx:1.25-alpine
    restart: on-failure
    init: true
    depends_on: [web]
    volumes:
      - ./bootstrap:/usr/share/nginx/html/bootstrap-entry:ro
      - ./bootstrap/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${APP_DATA_DIR}:/app-data:ro

  web:
    image: ghcr.io/harmalh/paperclip-umbrel:2026.325.0@sha256:1090a64d3c7b50301b4dd3b4b2b832252031fca145023b0cb11b4063c8dc2558
    restart: on-failure
    stop_grace_period: 1m
    init: true
    user: "1000:1000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: "/paperclip"
      # Authenticated/private mode enforces a Host allowlist. Umbrel opens a bootstrap
      # entry route first, but the underlying Paperclip app still needs its canonical
      # public URL for auth callbacks and invite URLs.
      # https://github.com/paperclipai/paperclip/blob/master/doc/DOCKER.md
      PAPERCLIP_PUBLIC_URL: "http://${DEVICE_DOMAIN_NAME}:${APP_PAPERCLIP_PUBLISHED_PORT:-23100}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${DEVICE_DOMAIN_NAME},${DEVICE_HOSTNAME},localhost,127.0.0.1"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      BETTER_AUTH_SECRET: "$APP_SEED"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_MIGRATION_PROMPT: "never"
    volumes:
      - ${APP_DATA_DIR}/data:/paperclip
