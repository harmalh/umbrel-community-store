version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: harmalh-paperclip_web_1
      APP_PORT: 3100

  web:
    image: ghcr.io/harmalh/paperclip-umbrel:2026.325.0@sha256:1090a64d3c7b50301b4dd3b4b2b832252031fca145023b0cb11b4063c8dc2558
    restart: on-failure
    stop_grace_period: 1m
    init: true
    user: "1000:1000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_HOME: "/paperclip"
      # Authenticated/private mode enforces a Host allowlist. Umbrel exposes the UI at
      # http://${DEVICE_DOMAIN_NAME}:3100 (see getumbrel/umbrel-apps README). Without this,
      # requests show "hostname not allowed" or HTTP 403 via the app proxy.
      # https://github.com/paperclipai/paperclip/blob/master/doc/DOCKER.md
      PAPERCLIP_PUBLIC_URL: "http://${DEVICE_DOMAIN_NAME}:3100"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${DEVICE_DOMAIN_NAME},${DEVICE_HOSTNAME},localhost,127.0.0.1"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      BETTER_AUTH_SECRET: "$APP_SEED"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_MIGRATION_PROMPT: "never"
    volumes:
      - ${APP_DATA_DIR}/data:/paperclip
