version: "3.7"

# Umbrel merges app_proxy. Main UI + API listen on 8080 inside the web container
# (nginx + Node). Redis data persists under ${APP_DATA_DIR}/redis.
# Images: ghcr.io/harmalh/worldmonitor-umbrel* (digest-pinned; rebuild via
# harmalh/umbrel-worldmonitor Actions).

services:
  app_proxy:
    environment:
      APP_HOST: harmalh-worldmonitor_web_1
      APP_PORT: 8080

  web:
    image: ghcr.io/harmalh/worldmonitor-umbrel:main@sha256:7f2ba7a74fb35cae1bbecb4da0c9ac5268f507fbe458122aa19a1c843dc10d5c
    restart: on-failure
    init: true
    depends_on:
      redis-rest:
        condition: service_started
      ais-relay:
        condition: service_started
    environment:
      UPSTASH_REDIS_REST_URL: "http://redis-rest:80"
      UPSTASH_REDIS_REST_TOKEN: "$APP_SEED"
      LOCAL_API_PORT: "46123"
      LOCAL_API_MODE: "docker"
      LOCAL_API_CLOUD_FALLBACK: "false"
      WS_RELAY_URL: "http://ais-relay:3004"
      LLM_API_URL: "${LLM_API_URL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY:-}"
      EIA_API_KEY: "${EIA_API_KEY:-}"
      FRED_API_KEY: "${FRED_API_KEY:-}"
      ACLED_ACCESS_TOKEN: "${ACLED_ACCESS_TOKEN:-}"
      NASA_FIRMS_API_KEY: "${NASA_FIRMS_API_KEY:-}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
      AVIATIONSTACK_API: "${AVIATIONSTACK_API:-}"

  ais-relay:
    image: ghcr.io/harmalh/worldmonitor-umbrel-ais-relay:main@sha256:68566bf3bedc006897db1dfa528edb1ca1baf75ac5d36fe570ae3405b5bb121d
    restart: on-failure
    init: true
    environment:
      AISSTREAM_API_KEY: "${AISSTREAM_API_KEY:-}"
      PORT: "3004"

  redis:
    image: redis:7-alpine
    restart: on-failure
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ${APP_DATA_DIR}/redis:/data

  redis-rest:
    image: ghcr.io/harmalh/worldmonitor-umbrel-redis-rest:main@sha256:0791277dc62d6075ed6e90240a8ef796937b0351e90023d62d8b2bbf1d81bd46
    restart: on-failure
    init: true
    depends_on:
      - redis
    environment:
      SRH_TOKEN: "$APP_SEED"
      SRH_CONNECTION_STRING: "redis://redis:6379"
