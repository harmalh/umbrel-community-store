manifestVersion: 1.1
id: harmalh-worldmonitor
name: World Monitor
tagline: Real-time global intelligence dashboard — news, maps, and signals
icon: https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-worldmonitor/assets/icon.svg
category: networks
version: "2.5.23"
port: 23150
description: >-
  Umbrel package for World Monitor (upstream koala73/worldmonitor): AI-assisted
  news aggregation, geopolitical monitoring, and infrastructure layers behind the
  Umbrel app proxy.


  Stack: main app container (static UI + local API), AIS relay, Redis, and a small
  Redis REST bridge. Optional API keys (LLM, finance, AIS, etc.) can be supplied
  via your environment or future exports; features degrade gracefully without them.


  Before installing from the community store, build and push the three GHCR images
  using the manual workflow in harmalh/umbrel-worldmonitor (see packaging README),
  or pin this compose file to your own registry.


  Packaging source: https://github.com/harmalh/umbrel-worldmonitor
developer: Elie Habib (World Monitor)
website: https://github.com/koala73/worldmonitor
submitter: Harm Alhusen
submission: https://github.com/harmalh/umbrel-community-store
repo: https://github.com/koala73/worldmonitor
support: https://github.com/koala73/worldmonitor/issues
gallery: []
releaseNotes: >-
  Initial Umbrel packaging: multi-container compose (web, ais-relay, redis,
  redis-rest), GHCR image workflow from upstream ref v2.5.23, pre-start hook for
  Redis data permissions.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
